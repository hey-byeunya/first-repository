<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>서비스 기획서 작성기</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="wrapper">

    <!-- 인트로 화면 -->
    <section id="intro" class="screen">
      <span class="tag">Q&A PRD Builder</span>
      <h1>서비스 기획서 작성기</h1>
      <p class="lead">질문에 하나씩 답하면, 답변을 모아 서비스 기획서(PRD)를 자동으로 정리해 드립니다.</p>
      <div class="card intro-card">
        <ul class="intro-list">
          <li>총 13개 질문 · 각 3~4줄이면 충분해요</li>
          <li>답변은 브라우저에 자동 저장되어 나중에 이어서 작성할 수 있어요</li>
          <li>완료하면 마크다운 문서로 복사하거나 파일로 내려받을 수 있어요</li>
        </ul>
      </div>
      <div class="button-row">
        <button id="startBtn" class="btn btn-primary">시작하기 →</button>
        <button id="resumeBtn" class="btn btn-ghost hidden">이어서 작성하기</button>
      </div>
    </section>

    <!-- 문답 화면 -->
    <section id="wizard" class="screen hidden">
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
      <div class="step-meta">
        <span id="stepCount"></span>
        <span id="stepSection" class="step-section"></span>
      </div>

      <div class="card question-card">
        <h2 id="questionTitle"></h2>
        <p id="questionHelp" class="question-help"></p>
        <textarea id="answerInput" rows="5" placeholder=""></textarea>
      </div>

      <div class="button-row">
        <button id="prevBtn" class="btn btn-ghost">← 이전</button>
        <button id="nextBtn" class="btn btn-primary">다음 →</button>
      </div>
    </section>

    <!-- 결과 화면 -->
    <section id="result" class="screen hidden">
      <span class="tag">Generated PRD</span>
      <h1 id="resultTitle">기획서 미리보기</h1>

      <div class="button-row">
        <button id="copyBtn" class="btn btn-primary">📋 마크다운 복사하기</button>
        <button id="downloadBtn" class="btn btn-ghost">⬇ .md 파일로 다운로드</button>
        <button id="editBtn" class="btn btn-ghost">✎ 답변 수정하기</button>
        <button id="restartBtn" class="btn btn-ghost">처음부터 다시</button>
      </div>

      <div id="prdPreview" class="card prd-preview"></div>
    </section>

  </div>

  <script src="script.js"></script>
</body>
</html>
