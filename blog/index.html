<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — hey-byeunya</title>
  <style>
    :root {
      --bg: #faf9f7;
      --surface: #ffffff;
      --border: #e8e5e0;
      --text: #1a1a1a;
      --text-secondary: #555;
      --text-muted: #999;
      --accent: #d97706;
      --shadow: 0 1px 3px rgba(0,0,0,0.04);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111114;
        --surface: #1a1a1f;
        --border: #2a2a30;
        --text: #e4e4e7;
        --text-secondary: #a1a1aa;
        --text-muted: #71717a;
        --accent: #f59e0b;
        --shadow: 0 1px 3px rgba(0,0,0,0.3);
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    .wrapper {
      max-width: 640px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    header {
      margin-bottom: 48px;
    }

    header h1 {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    header p {
      margin-top: 8px;
      font-size: 14px;
      color: var(--text-muted);
    }

    .post-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .post-card {
      display: block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 24px;
      text-decoration: none;
      color: inherit;
      box-shadow: var(--shadow);
      transition: border-color 0.15s, transform 0.15s;
    }

    .post-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .post-card .tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .post-card h2 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .post-card p {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .post-card .meta {
      font-size: 12px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <header>
      <h1>Blog</h1>
      <p>게임 기획서와 개발 기록을 모아두는 곳</p>
    </header>

    <ul class="post-list">
      <li>
        <a class="post-card" href="posts/rock-paper-scissors-prd/">
          <span class="tag">Game PRD</span>
          <h2>가위바위보 — 게임 기획서</h2>
          <p>컴퓨터(AI)를 상대로 가위·바위·보를 겨루는 3판 2선승제 웹 게임. 카운트다운 후 동시 공개 방식.</p>
          <span class="meta">2026. 7. 14</span>
        </a>
      </li>
    </ul>
  </div>
</body>
</html>
