<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>나의 첫 웹페이지</title>
</head>
<body>
  <h1>눈썰미 있는 기획자</h1>
  <p>서비스 운영 중 발생하는 불편 신호와 사용자 피드백을 AI로 자동 분석해 개선 포인트를 빠르게 찾아내고 싶습니다.</p>
  <ul>
    <li>
      <strong>사용자 피드백 분류</strong> - 쌓이는 문의와 리뷰를 AI가 유형별로 자동 분류해줍니다.
    </li>
    <li>
      <strong>이슈 우선순위 정리</strong> - 반복되는 불편 신호를 모아 심각도와 빈도 기준으로 우선순위를 매겨줍니다.
    </li>
    <li>
      <strong>개선 리포트 초안 작성</strong> - 발견한 문제와 데이터를 바탕으로 기획 리포트 초안을 AI가 자동 생성해줍니다.
    </li>
  </ul>
</body>
</html>
